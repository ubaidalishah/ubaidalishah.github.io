<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>University Application Tracker</h2>

    <div class="form-container">
      <input type="text" id="name" placeholder="University Name" />
      <input type="url" id="website" placeholder="University Website" />
      <input type="text" id="country" placeholder="Country" />
      <input type="date" id="date" />
      <button class="btns" onclick="addRow()">Add University</button>
    </div>

    <table id="universityTable">
      <thead>
        <tr>
          <th>University</th>
          <th>Website</th>
          <th>Country</th>
          <th>Application Deadline</th>
          <th>Applied</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dynamic rows will be added here -->
      </tbody>
    </table>

    <button class="btns" onclick="downloadPDF()">Download PDF</button>

    <script src="script.js"></script>
    <script src="https://rawgit.com/eKoopmans/html2pdf/master/dist/html2pdf.bundle.js"></script>
  </body>
</html>
